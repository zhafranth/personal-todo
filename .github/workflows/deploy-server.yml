name: Deploy Server to VPS

on:
  push:
    branches: [main]
    paths:
      - "server/**"

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            APP_DIR="$HOME/personal-todo"

            if [ ! -d "$APP_DIR" ]; then
              echo "==> Directory not found. Cloning repository..."
              git clone https://github.com/zhafranth/personal-todo.git "$APP_DIR"
            fi

            cd "$APP_DIR"

            echo "==> Pulling latest changes..."
            git pull origin main

            echo "==> Running migrations..."
            cd server/migrations
            for f in $(ls *.sql | sort); do
              sudo -u postgres psql -d personal_todo -f "$f" 2>&1 || true
            done

            echo "==> Building server..."
            cd "$APP_DIR/server"
            go build -o server ./cmd/server

            echo "==> Restarting service..."
            sudo systemctl restart personal-todo

            sleep 2
            if sudo systemctl is-active --quiet personal-todo; then
              echo "==> Deploy successful!"
            else
              echo "==> Deploy FAILED!"
              sudo journalctl -u personal-todo --no-pager -n 20
              exit 1
            fi
